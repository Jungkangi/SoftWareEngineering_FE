name: Deploy to EC2

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/SoftWareEngineering_FE || exit 1
            git reset --hard
            git clean -fd
            git pull origin dev
            npm ci
            pm2 delete aegis-frontend || true
            pm2 start npm --name "aegis-frontend" -- start